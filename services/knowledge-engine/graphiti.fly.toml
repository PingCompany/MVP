app = "ping-graphiti"
primary_region = "waw"

[build]
  image = "zepai/graphiti:latest"

[env]
  NEO4J_URI = "bolt://ping-neo4j.internal:7687"
  NEO4J_USER = "neo4j"
  NEO4J_PORT = "7687"

# OPENAI_API_KEY and NEO4J_PASSWORD are set via `fly secrets set`

[http_service]
  internal_port = 8000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  path = "/healthcheck"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
