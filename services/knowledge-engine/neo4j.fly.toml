app = "ping-neo4j"
primary_region = "waw"

[build]
  image = "neo4j:5.22.0-community"

[env]
  NEO4J_PLUGINS = '["apoc"]'
  NEO4J_server_memory_heap_initial__size = "512m"
  NEO4J_server_memory_heap_max__size = "512m"

# Neo4j HTTP browser (public, for admin access)
[http_service]
  internal_port = 7474
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"

[[http_service.checks]]
  grace_period = "30s"
  interval = "15s"
  method = "GET"
  path = "/"
  timeout = "5s"

# Bolt protocol (private, for Graphiti)
[[services]]
  protocol = "tcp"
  internal_port = 7687
  [[services.ports]]
    port = 7687

[[mounts]]
  source = "neo4j_data"
  destination = "/data"
  initial_size = "10"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
