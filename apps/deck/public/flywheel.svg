<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#4f46e5" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 2 L 8 5 L 0 8" fill="none" stroke="#4f46e5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1000" height="800" fill="#030303" />

  <!-- Center Hub -->
  <circle cx="500" cy="400" r="75" fill="#0a0a0a" stroke="#1e1b4b" stroke-width="1.5" stroke-dasharray="4 4" />
  <text font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
    <tspan x="500" y="395" font-size="11" font-weight="700" letter-spacing="0.12em" fill="#4f46e5" opacity="0.7">DATA</tspan>
    <tspan x="500" y="416" font-size="13" font-weight="800" letter-spacing="0.06em" fill="#818cf8">FLYWHEEL</tspan>
  </text>

  <!-- Arcs -->
  <path d="M 546.6 226.1 A 180 180 0 0 1 673.9 353.4" fill="none" stroke="#312e81" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 546.6 226.1 A 180 180 0 0 1 673.9 353.4" transform="rotate(90 500 400)" fill="none" stroke="#312e81" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 546.6 226.1 A 180 180 0 0 1 673.9 353.4" transform="rotate(180 500 400)" fill="none" stroke="#312e81" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 546.6 226.1 A 180 180 0 0 1 673.9 353.4" transform="rotate(270 500 400)" fill="none" stroke="#312e81" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- NODE 1: CAPTURE -->
  <g transform="translate(500, 220)">
    <circle cx="0" cy="0" r="26" fill="#0d0d1a" stroke="#4f46e5" stroke-width="1.5" filter="url(#shadow)" />
    <text x="0" y="7" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#818cf8" text-anchor="middle">1</text>
  </g>
  <text font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
    <tspan x="500" y="138" font-size="18" font-weight="700" fill="#f1f5f9">Capture</tspan>
    <tspan x="500" y="162" font-size="13" fill="#475569">Raw communication ingested from all</tspan>
    <tspan x="500" y="181" font-size="13" fill="#475569">connected sources in real time</tspan>
  </text>

  <!-- NODE 2: EXTRACT -->
  <g transform="translate(680, 400)">
    <circle cx="0" cy="0" r="26" fill="#0d0d1a" stroke="#4f46e5" stroke-width="1.5" filter="url(#shadow)" />
    <text x="0" y="7" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#818cf8" text-anchor="middle">2</text>
  </g>
  <text font-family="system-ui, -apple-system, sans-serif" text-anchor="start">
    <tspan x="725" y="388" font-size="18" font-weight="700" fill="#f1f5f9">Extract</tspan>
    <tspan x="725" y="412" font-size="13" fill="#475569">Decisions, commitments, blockers</tspan>
    <tspan x="725" y="431" font-size="13" fill="#475569">classified and structured</tspan>
  </text>

  <!-- NODE 3: LEARN -->
  <g transform="translate(500, 580)">
    <circle cx="0" cy="0" r="26" fill="#0d0d1a" stroke="#4f46e5" stroke-width="1.5" filter="url(#shadow)" />
    <text x="0" y="7" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#818cf8" text-anchor="middle">3</text>
  </g>
  <text font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
    <tspan x="500" y="644" font-size="18" font-weight="700" fill="#f1f5f9">Learn</tspan>
    <tspan x="500" y="668" font-size="13" fill="#475569">Every resolved decision becomes labeled</tspan>
    <tspan x="500" y="687" font-size="13" fill="#475569">training data for domain classifiers</tspan>
  </text>

  <!-- NODE 4: DEEPEN -->
  <g transform="translate(320, 400)">
    <circle cx="0" cy="0" r="26" fill="#0d0d1a" stroke="#4f46e5" stroke-width="1.5" filter="url(#shadow)" />
    <text x="0" y="7" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#818cf8" text-anchor="middle">4</text>
  </g>
  <text font-family="system-ui, -apple-system, sans-serif" text-anchor="end">
    <tspan x="275" y="376" font-size="18" font-weight="700" fill="#f1f5f9">Deepen</tspan>
    <tspan x="275" y="400" font-size="13" fill="#475569">Org-specific temporal graph grows:</tspan>
    <tspan x="275" y="419" font-size="13" fill="#475569">approval patterns, routing norms,</tspan>
    <tspan x="275" y="438" font-size="13" fill="#475569">expert domains</tspan>
  </text>
</svg>
