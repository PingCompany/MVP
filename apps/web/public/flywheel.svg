<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 1.5 L 8 5 L 0 8.5" fill="none" stroke="#4f46e5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1100" height="800" fill="#030303"/>

  <!-- Ring arcs — center 550,400 radius 210, gaps at nodes -->
  <path d="M 604.4 197.1 A 210 210 0 0 1 752.9 345.6" fill="none" stroke="#312e81" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 604.4 197.1 A 210 210 0 0 1 752.9 345.6" transform="rotate(90 550 400)" fill="none" stroke="#312e81" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 604.4 197.1 A 210 210 0 0 1 752.9 345.6" transform="rotate(180 550 400)" fill="none" stroke="#312e81" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 604.4 197.1 A 210 210 0 0 1 752.9 345.6" transform="rotate(270 550 400)" fill="none" stroke="#312e81" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Center hub -->
  <circle cx="550" cy="400" r="70" fill="#080814" stroke="#1e1b4b" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text text-anchor="middle" font-family="system-ui,-apple-system,sans-serif">
    <tspan x="550" y="394" font-size="13" font-weight="700" letter-spacing="0.14em" fill="#4f46e5" opacity="0.8">DATA</tspan>
    <tspan x="550" y="416" font-size="15" font-weight="800" letter-spacing="0.08em" fill="#818cf8">FLYWHEEL</tspan>
  </text>

  <!-- NODE 1 — CAPTURE (top) -->
  <circle cx="550" cy="190" r="40" fill="#0a0a1e" stroke="#4f46e5" stroke-width="2" filter="url(#glow)"/>
  <text x="550" y="198" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#818cf8">1</text>
  <text text-anchor="middle" font-family="system-ui,-apple-system,sans-serif">
    <tspan x="550" y="78" font-size="26" font-weight="700" fill="#f1f5f9">Capture</tspan>
    <tspan x="550" y="110" font-size="17" fill="#64748b">All channels ingested</tspan>
    <tspan x="550" y="134" font-size="17" fill="#64748b">in real time</tspan>
  </text>

  <!-- NODE 2 — EXTRACT (right) -->
  <circle cx="760" cy="400" r="40" fill="#0a0a1e" stroke="#4f46e5" stroke-width="2" filter="url(#glow)"/>
  <text x="760" y="408" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#818cf8">2</text>
  <text text-anchor="start" font-family="system-ui,-apple-system,sans-serif">
    <tspan x="820" y="388" font-size="26" font-weight="700" fill="#f1f5f9">Extract</tspan>
    <tspan x="820" y="418" font-size="17" fill="#64748b">Decisions, blockers,</tspan>
    <tspan x="820" y="441" font-size="17" fill="#64748b">commitments classified</tspan>
  </text>

  <!-- NODE 3 — LEARN (bottom) -->
  <circle cx="550" cy="610" r="40" fill="#0a0a1e" stroke="#4f46e5" stroke-width="2" filter="url(#glow)"/>
  <text x="550" y="618" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#818cf8">3</text>
  <text text-anchor="middle" font-family="system-ui,-apple-system,sans-serif">
    <tspan x="550" y="682" font-size="26" font-weight="700" fill="#f1f5f9">Learn</tspan>
    <tspan x="550" y="712" font-size="17" fill="#64748b">Each resolved decision</tspan>
    <tspan x="550" y="735" font-size="17" fill="#64748b">trains the classifier</tspan>
  </text>

  <!-- NODE 4 — DEEPEN (left) -->
  <circle cx="340" cy="400" r="40" fill="#0a0a1e" stroke="#4f46e5" stroke-width="2" filter="url(#glow)"/>
  <text x="340" y="408" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#818cf8">4</text>
  <text text-anchor="end" font-family="system-ui,-apple-system,sans-serif">
    <tspan x="280" y="374" font-size="26" font-weight="700" fill="#f1f5f9">Deepen</tspan>
    <tspan x="280" y="404" font-size="17" fill="#64748b">Org temporal graph</tspan>
    <tspan x="280" y="427" font-size="17" fill="#64748b">grows permanently</tspan>
  </text>
</svg>
